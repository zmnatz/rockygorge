store:
  title: "Store Admin"
  endpoint: "admin-store"
  dataFilePath: "src/data/store.yml"
  getItemId: "slug"
  columns:
    - field: "slug"
    - field: "title"
    - field: "hide"
      render: "boolean"
  fields:
    - name: "title"
      type: "text"
    - name: "description"
      type: "text"
    - name: "summary"
      type: "text"
    - name: "defaultAmount"
      type: "number"
    - name: "details"
      type: "textarea"
    - name: "hide"
      label: "Hide Item"
      type: "boolean"
    - name: "options"
      type: "keyValueMap"
    - name: "supporters"
      type: "textList"

events:
  title: "Events Admin"
  endpoint: "admin-events"
  dataFilePath: "src/data/events.yml"
  getItemId: "slug"
  columns:
    - field: "slug"
    - field: "title"
    - field: "hide"
      render: "boolean"
  fields:
    - name: "title"
      type: "text"
    - name: "description"
      type: "text"
    - name: "summary"
      type: "text"
    - name: "hide"
      label: "Hide Event"
      type: "boolean"
    - name: "organizers"
      type: "textList"

links:
  title: "Links Admin"
  endpoint: "admin-links"
  dataFilePath: "src/data/links.yml"
  getItemId: "slug"
  columns:
    - field: "slug"
    - field: "title"
    - field: "hide"
      render: "boolean"
  fields:
    - name: "title"
      type: "text"
    - name: "summary"
      type: "text"
    - name: "href"
      type: "text"
    - name: "header"
      label: "Is Header"
      type: "boolean"
    - name: "hide"
      label: "Hide Link"
      type: "boolean"

forms:
  title: "Forms Admin"
  endpoint: "admin-forms"
  dataFilePath: "src/data/forms.yml"
  getItemId: "slug"
  columns:
    - field: "slug"
    - field: "title"
    - field: "hide"
      render: "boolean"
  fields:
    - name: "title"
      type: "text"
    - name: "summary"
      type: "text"
    - name: "formId"
      label: "Form ID"
      type: "text"
    - name: "href"
      type: "text"
    - name: "formLink"
      type: "text"
    - name: "width"
      type: "number"
    - name: "height"
      type: "number"
    - name: "hide"
      label: "Hide Form"
      type: "boolean"

calendar:
  title: "Calendar Admin"
  endpoint: "admin-calendar"
  dataFilePath: "src/data/calendar.yml"
  getItemId: "name"
  transforms: "calendar"
  globalFields:
    - name: "months"
      type: "number"
  columns:
    - field: "name"
    - field: "matches"
      render: "calendarMatches"
    - field: "limit"
    - field: "hideSummary"
      render: "boolean"
  fields:
    - name: "name"
      type: "text"
    - name: "matches"
      type: "text"
    - name: "notMatches"
      type: "text"
    - name: "limit"
      type: "number"
    - name: "hideSummary"
      type: "boolean"

link_mappings:
  title: "Link Mappings Admin"
  endpoint: "admin-link-mappings"
  dataFilePath: "src/data/link_mappings.yml"
  getItemId: "type"
  transforms: "linkMappings"
  columns:
    - field: "type"
    - field: "default"
  fields:
    - name: "type"
      type: "text"
    - name: "default"
      type: "text"
    - name: "mappings"
      label: "Mappings (Label -> Regex)"
      type: "textKeyValueMap"
